<svg viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="700" fill="#131313"/>

  <!-- Scattered chaotic starting points (left side - unclear direction) -->
  <g stroke="#555555" stroke-width="1" fill="none" opacity="0.7">
    <path d="M160,220 L230,260 L190,310 L250,340"/>
    <path d="M180,420 L240,390 L210,460 L270,440"/>
    <path d="M200,540 L260,510 L230,580"/>
  </g>
  <g fill="#666666">
    <circle cx="160" cy="220" r="5"/>
    <circle cx="230" cy="260" r="5"/>
    <circle cx="190" cy="310" r="5"/>
    <circle cx="250" cy="340" r="5"/>
    <circle cx="180" cy="420" r="5"/>
    <circle cx="240" cy="390" r="5"/>
    <circle cx="210" cy="460" r="5"/>
    <circle cx="270" cy="440" r="5"/>
    <circle cx="200" cy="540" r="5"/>
    <circle cx="260" cy="510" r="5"/>
    <circle cx="230" cy="580" r="5"/>
  </g>

  <!-- Central compass - the coaching guidance -->
  <circle cx="700" cy="350" r="90" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="700" cy="350" r="64" fill="none" stroke="#E8501A" stroke-width="1.6" opacity="0.7"/>

  <!-- Compass needle pointing toward clarity (right) -->
  <path d="M700,350 L760,335 L700,290 Z" fill="#E8501A"/>
  <path d="M700,350 L648,368 L700,410 Z" fill="#3a3a3a"/>

  <!-- Compass tick marks -->
  <g stroke="#666666" stroke-width="1.4">
    <line x1="700" y1="266" x2="700" y2="280"/>
    <line x1="700" y1="420" x2="700" y2="434"/>
    <line x1="616" y1="350" x2="630" y2="350"/>
    <line x1="770" y1="350" x2="784" y2="350"/>
  </g>
  <circle cx="700" cy="350" r="7" fill="#0d0d0d" stroke="#E8501A" stroke-width="2"/>

  <!-- Clear guided path from compass to structured destination -->
  <path d="M792,350 C920,350 980,350 1080,350" stroke="#F07840" stroke-width="2" fill="none"/>
  <path d="M1060,332 L1080,350 L1060,368" stroke="#F07840" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Structured destination - ascending clear bars (growth/clarity achieved) -->
  <g fill="none" stroke="#E8501A" stroke-width="1.8">
    <rect x="1120" y="400" width="26" height="90"/>
    <rect x="1160" y="350" width="26" height="140"/>
    <rect x="1200" y="290" width="26" height="200"/>
  </g>
  <g fill="#F07840">
    <circle cx="1133" cy="400" r="4"/>
    <circle cx="1173" cy="350" r="4"/>
    <circle cx="1213" cy="290" r="4"/>
  </g>
</svg>
